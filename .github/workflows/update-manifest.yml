name: Update notes manifest
on:
  push:
    paths: ['notes/**.txt']
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate manifest
        run: |
          cd notes
          ls *.txt | jq -R -s -c 'split("\n") | map(select(length > 0))' > manifest.json
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/manifest.json
          git diff --staged --quiet || git commit -m "Auto-update notes manifest"
          git push
